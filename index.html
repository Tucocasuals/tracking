<!DOCTYPE html>
<html>
<head>
  <title>Tucocasuals Tracking</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('watch.jpg') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.3);
    }

    .main {
      position: relative;
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 30px;
      margin-bottom: 5px;
    }

    .subtitle {
      margin-bottom: 20px;
      font-size: 14px;
      color: #ddd;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    input {
      width: 65%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 16px;
      margin-left: 5px;
      cursor: pointer;
    }

    button:disabled {
      background: gray;
      cursor: not-allowed;
    }

    .loader {
      border: 4px solid #ccc;
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    #result {
      margin-top: 20px;
      display: none;
    }

    .order-card {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: left;
      font-size: 14px;
    }

    .again {
      margin-top: 15px;
      cursor: pointer;
      font-size: 14px;
    }

    /* 📱 MOBILE FIX */
    @media (max-width: 500px) {
      input {
        width: 100%;
        margin-bottom: 8px;
      }

      button {
        display: block;
        width: 100%;
        margin: 10px 0 0 0; /* 👈 spacing added */
      }
    }

  </style>
</head>

<body>

<div class="main">
  <h1>Find Your Tracking</h1>
  <div class="subtitle">Elegance in Every Detail ✨</div>

  <div class="box">
    <p>Enter contact number as on address (+91 optional)</p>

    <input type="text" id="number" placeholder="Enter phone number">
    <button id="searchBtn" onclick="getData()">Search</button>
  </div>

  <div class="loader" id="loader"></div>
  <div id="result"></div>

  <div class="again" onclick="resetPage()">Find Another Tracking</div>
</div>

<script>

  const API_KEY = "CHANGE_THIS_TO_RANDOM_123456";

  const API_URL = "https://script.google.com/macros/s/AKfycbwGFOsIRMraWiEbcF7pPkgQQNF6KSRJcmUzm_fPpb2Whp3NcRW0GqHPUmrf40612bPi/exec";

  function normalize(num) {
    return num.replace(/\D/g, "").slice(-10);
  }

  function getData() {

    let number = document.getElementById("number").value;
    number = normalize(number);

    const btn = document.getElementById("searchBtn");

    if (!number || number.length < 10) {
      showResult("Enter valid phone number");
      return;
    }

    btn.disabled = true;

    const url = `${API_URL}?number=${number}&key=${API_KEY}`;

    document.getElementById("loader").style.display = "block";
    document.getElementById("result").style.display = "none";

    fetch(url)
      .then(res => res.json())
      .then(data => {

        btn.disabled = false;
        document.getElementById("loader").style.display = "none";
        document.getElementById("result").style.display = "block";

        if (data.error) {
          showResult(data.error);
          return;
        }

        let output = "";

        data.forEach((item, index) => {
          output += `
            <div class="order-card">
              <b>Order ${index + 1}</b><br><br>
              Date: ${item.date}<br><br>
              Name: ${escapeHtml(item.name)}<br><br>
              Tracking: ${escapeHtml(item.tracking)}<br><br>
              Courier: ${escapeHtml(item.courier)}<br><br>
              Status: ${item.status}<br>
              ${item.warranty ? "<br><b style='color:green'>" + item.warranty + "</b>" : ""}
            </div>
          `;
        });

        document.getElementById("result").innerHTML = output;

      })
      .catch(() => {
        btn.disabled = false;
        document.getElementById("loader").style.display = "none";
        showResult("Server error");
      });
  }

  function showResult(msg) {
    document.getElementById("result").style.display = "block";
    document.getElementById("result").innerText = msg;
  }

  function resetPage() {
    document.getElementById("result").style.display = "none";
    document.getElementById("result").innerHTML = "";
    document.getElementById("number").value = "";
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

</script>

</body>
</html>
