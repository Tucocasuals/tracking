<!DOCTYPE html>

<html>
<head>
  <title>Tucocasuals Tracking</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      background: url('watch.jpg') no-repeat center center fixed;
      background-size: cover;

      height: 100vh;
      color: white;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Dark overlay */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    .main {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 90%;
      max-width: 600px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .subtitle {
      color: #ddd;
      margin-bottom: 25px;
      font-size: 18px;
    }

    .box {
      background: rgba(0,0,0,0.7);
      padding: 25px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
    }

    .box p {
      font-size: 16px;
      margin-bottom: 15px;
    }

    input {
      width: 70%;
      padding: 15px;
      border-radius: 8px;
      border: none;
      font-size: 18px;
    }

    button {
      padding: 14px 22px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 18px;
      margin-left: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .paste-btn {
      margin-top: 12px;
      background: #333;
      padding: 8px 14px;
      border-radius: 6px;
      display: inline-block;
      cursor: pointer;
      font-size: 16px;
    }

    #result {
      margin-top: 25px;
      display: none;
      background: white;
      color: black;
      padding: 18px;
      border-radius: 10px;
      text-align: left;
      font-size: 16px;
    }

    .again {
      margin-top: 18px;
      color: #ccc;
      cursor: pointer;
      font-size: 15px;
    }

  </style>

</head>

          document.getElementById("result").style.display = "block";

            document.getElementById("result").innerText = "No tracking found";
          } else {
            document.getElementById("result").innerHTML =
              "Date: " + (data.date || "-") + "<br><br>" +
              "Customer Name: " + data.name + "<br><br>" +
              "AWB: " + data.tracking + "<br><br>" +
              "Courier Name: " + data.courier + "<br><br>" +
              "Status: " + data.status;
          }
        });
    }
