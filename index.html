<!DOCTYPE html>
<html>
<head>
  <title>Tucocasuals Tracking</title>

  <!-- Mobile Fix -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: url('watch.jpg') no-repeat center center fixed;
      background-size: cover;
      height: 100vh;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.2);
      z-index: 0;
    }

    .main {
      position: relative;
      z-index: 1;
      text-align: center;
      width: 90%;
      max-width: 500px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 5px;
      font-weight: bold;
    }

    .subtitle {
      color: #eee;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .box {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(12px);
    }

    input {
      width: 65%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px 18px;
      border-radius: 8px;
      border: none;
      background: #22c55e;
      color: white;
      font-size: 16px;
      margin-left: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .paste-btn {
      margin-top: 10px;
      background: rgba(0,0,0,0.4);
      padding: 6px 12px;
      border-radius: 6px;
      display: inline-block;
      cursor: pointer;
      font-size: 14px;
    }

    /* Loader */
    .loader {
      border: 4px solid #ccc;
      border-top: 4px solid #22c55e;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 20px auto;
      display: none;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #result {
      margin-top: 20px;
      display: none;
      color: white;
    }

    .order-card {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
      text-align: left;
      font-size: 14px;
    }

    .again {
      margin-top: 15px;
      color: #eee;
      cursor: pointer;
      font-size: 14px;
    }

    @media (max-width: 500px) {
      .main {
        transform: scale(1.04);
      }
    }

  </style>

</head>

<body>

  <div class="main">
    <h1>Find Your Tracking</h1>
    <div class="subtitle">Elegance in Every Detail ✨</div>

    <div class="box">
      <p>Enter contact number as on address (+91 optional)</p>

      <input type="text" id="number" placeholder="9633150834">
      <button onclick="getData()">Search</button>

      <div class="paste-btn" onclick="pasteText()">Paste</div>
    </div>

    <div class="loader" id="loader"></div>

    <div id="result"></div>

    <div class="again" onclick="resetPage()">Find Another Tracking</div>
  </div>

  <script>
    const API_KEY = "tucocasuals_secure_2026";

    function getData() {
      let number = document.getElementById("number").value;

      // ✅ BLOCK EMPTY INPUT
      if (!number || number.trim() === "") {
        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerText = "Please enter your phone number";
        return;
      }

      const url = "https://script.google.com/macros/s/AKfycbwGFOsIRMraWiEbcF7pPkgQQNF6KSRJcmUzm_fPpb2Whp3NcRW0GqHPUmrf40612bPi/exec?number=" 
        + number + "&key=" + API_KEY;

      document.getElementById("loader").style.display = "block";
      document.getElementById("result").style.display = "none";

      fetch(url)
        .then(res => res.json())
        .then(data => {

          document.getElementById("loader").style.display = "none";
          document.getElementById("result").style.display = "block";

          if (data.error) {
            document.getElementById("result").innerText = data.error;
          } else {
            let output = "";

            data.forEach((item, index) => {
              output += `
                <div class="order-card">
                  <b>Order ${index + 1}</b><br><br>
                  Date: ${item.date}<br><br>
                  Customer Name: ${item.name}<br><br>
                  AWB: ${item.tracking}<br><br>
                  Courier Name: ${item.courier}<br><br>
                  Status: ${item.status}<br>
                  ${item.warranty ? "<br><b style='color:green'>" + item.warranty + "</b>" : ""}
                </div>
              `;
            });

            document.getElementById("result").innerHTML = output;
          }
        })
        .catch(() => {
          document.getElementById("loader").style.display = "none";
          document.getElementById("result").style.display = "block";
          document.getElementById("result").innerText = "Server error";
        });
    }

    function resetPage() {
      document.getElementById("result").style.display = "none";
      document.getElementById("result").innerHTML = "";
      document.getElementById("number").value = "";
    }

    async function pasteText() {
      try {
        const text = await navigator.clipboard.readText();
        document.getElementById("number").value = text;
      } catch {
        alert("Paste not allowed");
      }
    }
  </script>

</body>
</html>
